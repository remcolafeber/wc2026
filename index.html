*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0f1117;color:#e8eaf0;min-height:100vh;padding:12px}
h1{font-size:20px;font-weight:600;text-align:center;margin:8px 0 2px;color:#fff}
.sub{text-align:center;font-size:12px;color:#888;margin-bottom:10px}
.toolbar{display:flex;gap:6px;justify-content:center;flex-wrap:wrap;margin-bottom:8px}
.toolbar button{font-size:12px;padding:5px 13px;border:1px solid #333;border-radius:8px;background:#1c1f2a;color:#ccc;cursor:pointer}
.toolbar button:active{opacity:.7}
.toolbar button.danger{border-color:#7f2020;color:#f87171}
.toolbar button.lock-on{background:#1a3a5c;border-color:#2563eb;color:#60a5fa}
.toolbar button:disabled{opacity:.3;cursor:default}
.status{text-align:center;font-size:11px;min-height:18px;margin-bottom:6px;color:#60a5fa}
.tab-bar{display:flex;border-bottom:1px solid #2a2d3a;margin-bottom:10px}
.tab{flex:1;font-size:13px;padding:7px 0;border:none;background:transparent;color:#888;cursor:pointer;border-bottom:2px solid transparent}
.tab.active{color:#fff;border-bottom-color:#3b82f6;font-weight:500}
.bracket-outer{overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:8px}
.bracket{display:flex;gap:4px;align-items:stretch;min-width:1100px;padding:0 4px}
.round{display:flex;flex-direction:column;min-width:110px}
.matches.stretch{display:flex;flex-direction:column;flex:1}
.slot{flex:1;display:flex;flex-direction:column;justify-content:center;min-height:60px}
.round-label{font-size:9px;font-weight:600;color:#666;text-align:center;padding:3px 0 6px;text-transform:uppercase;letter-spacing:.06em}
.match-wrap{display:flex;flex-direction:column;gap:1px}
.match-info{font-size:8px;color:#555;text-align:center;margin-bottom:1px;line-height:1.3}
.match{border:1px solid #2a2d3a;border-radius:6px;overflow:hidden;background:#1c1f2a;width:108px}
.team{display:flex;align-items:center;gap:3px;padding:4px 5px;font-size:11px;cursor:pointer;min-height:25px;border-bottom:1px solid #2a2d3a;transition:background .1s;-webkit-tap-highlight-color:transparent}
.team:last-child{border-bottom:none}
.team:active:not(.tbd):not(.locked-team){background:#252836}
.team.winner{background:#1e3a5f;font-weight:600;color:#93c5fd}
.team.tbd{color:#444;cursor:default}
.team.locked-team{cursor:default}
.team.locked-winner{background:#14432a;font-weight:600;color:#6ee7b7}
.flag{font-size:13px;flex-shrink:0;line-height:1}
.tname{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lk{font-size:9px;flex-shrink:0}
.team.real-win{box-shadow:inset 3px 0 0 #22c55e}
.team.real-lose{opacity:.4}
.team.wrong-pick{color:#f87171}
.team.right-pick{color:#6ee7b7}
.rc{font-size:10px;flex-shrink:0;font-weight:700}
.rc.ok{color:#6ee7b7}
.rc.bad{color:#f87171}
.tscore{font-size:11px;font-weight:700;color:#9aa0ad;flex-shrink:0;min-width:12px;text-align:right;margin-left:2px}
.team.real-win .tscore{color:#6ee7b7}
.rc.ok{color:#6ee7b7}
.rc.bad{color:#f87171}
.center-col{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:130px;gap:6px;padding:0 4px}
.final-lbl{font-size:9px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.06em;text-align:center}
.champ-box{border:1.5px solid #2563eb;border-radius:10px;padding:8px 10px;min-width:100px;text-align:center}
.champ-flag{font-size:22px;margin-bottom:2px}
.champ-name{font-size:13px;font-weight:600;color:#93c5fd}
.schedule{padding:0 2px}
.day-block{margin-bottom:14px}
.day-hdr{font-size:12px;font-weight:600;padding:5px 0 6px;border-bottom:1px solid #2a2d3a;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.day-hdr span:first-child{color:#fff}
.day-hdr span:last-child{font-size:10px;color:#666;font-weight:400}
.sm{display:flex;align-items:center;gap:7px;padding:6px 8px;border:1px solid #2a2d3a;border-radius:8px;background:#1c1f2a;margin-bottom:5px}
.sm.picked{border-color:#2563eb;background:#111d2e}
.sm-time{font-size:11px;color:#888;min-width:58px;flex-shrink:0;line-height:1.3}
.sm-round{font-size:9px;padding:2px 5px;border-radius:4px;background:#252836;color:#888;min-width:46px;text-align:center;flex-shrink:0}
.sm-teams{flex:1;font-size:12px;display:flex;align-items:center;gap:4px;flex-wrap:wrap;min-width:0}
.sm-venue{font-size:10px;color:#555;text-align:right;flex-shrink:0;max-width:90px;line-height:1.3}
.odds-box{display:flex;gap:3px;flex-shrink:0;align-items:center}
.odds-input{width:38px;font-size:11px;padding:3px 2px;text-align:center;border:1px solid #2a2d3a;border-radius:5px;background:#0f1117;color:#fbbf24;-moz-appearance:textfield}
.odds-input::-webkit-outer-spin-button,.odds-input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.odds-input:focus{outline:none;border-color:#3b82f6;color:#fff}
.odds-input::placeholder{color:#444}
.odds-lbl{font-size:8px;color:#555;text-align:center;width:38px;display:block;margin-bottom:1px}
.bracket-odds{display:flex;gap:2px;justify-content:center;margin-top:2px}
.bracket-odds span{font-size:8px;color:#fbbf24;background:#1c1f2a;border:1px solid #2a2d3a;border-radius:3px;padding:1px 2px;min-width:20px;text-align:center}
.bracket-odds span.empty{color:#444}
.odds-hint{font-size:11px;color:#888;text-align:center;padding:8px;background:#1c1f2a;border:1px solid #2a2d3a;border-radius:8px;margin-bottom:12px}
.vs{color:#555;font-size:10px}
.w1{font-weight:600;color:#93c5fd}
.groups-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px}
.gc{border:1px solid #2a2d3a;border-radius:8px;overflow:hidden}
.gh{background:#252836;padding:4px 8px;font-size:10px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.05em}
.gt{width:100%;border-collapse:collapse;font-size:10px}
.gt th{padding:3px 5px;text-align:center;color:#555;font-weight:400;border-bottom:1px solid #2a2d3a}
.gt th:first-child{text-align:left}
.gt td{padding:3px 5px;text-align:center;border-bottom:1px solid #1e2130}
.gt td:first-child{text-align:left}
.gt tr:last-child td{border-bottom:none}
.gt tr.q td{background:rgba(37,99,235,.12)}
.gt tr.clickable{cursor:pointer}
.gt tr.clickable:active td{background:rgba(255,255,255,.06)}
.tfn{display:flex;align-items:center;gap:4px}
/* DETAIL PANEL */
.dp{display:none;position:fixed;inset:0;background:#0f1117;z-index:100;overflow-y:auto}
.dp.open{display:block}
.dp-hdr{display:flex;align-items:center;gap:10px;padding:14px 14px 10px;border-bottom:1px solid #2a2d3a;position:sticky;top:0;background:#0f1117;z-index:10}
.dp-back{background:none;border:none;color:#3b82f6;font-size:15px;cursor:pointer;padding:4px 0;flex-shrink:0}
.dp-title{font-size:17px;font-weight:600;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.dp-body{padding:12px 14px}
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:14px}
.stat-box{background:#1c1f2a;border:1px solid #2a2d3a;border-radius:8px;padding:8px 6px;text-align:center}
.stat-val{font-size:20px;font-weight:700;color:#fff;line-height:1}
.stat-lbl{font-size:9px;color:#666;margin-top:3px;text-transform:uppercase;letter-spacing:.04em}
.sec-title{font-size:11px;font-weight:600;color:#666;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
.rc{background:#1c1f2a;border:1px solid #2a2d3a;border-radius:8px;padding:9px 11px;margin-bottom:7px;border-left-width:3px}
.rc.win{border-left-color:#22c55e}
.rc.draw{border-left-color:#eab308}
.rc.loss{border-left-color:#ef4444}
.rc.ko{border-left-color:#3b82f6}
.rc-date{font-size:10px;color:#555;margin-bottom:4px}
.rc-teams{display:flex;align-items:center;gap:6px;font-size:13px;margin-bottom:4px;flex-wrap:wrap}
.rc-score{font-size:15px;font-weight:700;color:#fff;padding:0 2px}
.rc-sc{font-size:11px;color:#888;line-height:1.6}
.badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:4px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-left:4px}
.bw{background:#14432a;color:#6ee7b7}
.bd{background:#3d3010;color:#fbbf24}
.bl{background:#3b1010;color:#f87171}
.bko{background:#1e3a5f;color:#93c5fd}
.btbd{background:#1e2130;color:#888}
.scorer-row{display:flex;align-items:center;justify-content:space-between;padding:7px 0;border-bottom:1px solid #1e2130}
.scorer-row:last-child{border-bottom:none}
.scorer-goals{font-size:16px;font-weight:700;color:#fbbf24}
.adv-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;background:#14432a;color:#6ee7b7}
.elim-badge{display:inline-block;font-size:9px;padding:2px 7px;border-radius:10px;font-weight:600;background:#3b1010;color:#f87171}
/* POOL */
.pool-box{background:#1c1f2a;border:1px solid #2a2d3a;border-radius:10px;padding:12px;margin-bottom:12px}
.pool-box h3{font-size:13px;font-weight:600;margin-bottom:8px;color:#fff}
.pool-input{width:100%;font-size:14px;padding:9px 11px;border:1px solid #2a2d3a;border-radius:8px;background:#0f1117;color:#e8eaf0;margin-bottom:8px}
.pool-input:focus{outline:none;border-color:#3b82f6}
.pool-btn{width:100%;font-size:14px;font-weight:600;padding:10px;border:none;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer}
.pool-btn:active{opacity:.8}
.pool-btn:disabled{opacity:.4;cursor:default}
.pool-btn.secondary{background:#252836;color:#ccc;border:1px solid #2a2d3a}
.pool-msg{font-size:12px;text-align:center;margin-top:8px;min-height:16px}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 11px;border:1px solid #2a2d3a;border-radius:8px;background:#1c1f2a;margin-bottom:6px;cursor:pointer}
.lb-row:active{background:#252836}
.lb-rank{font-size:15px;font-weight:700;color:#888;min-width:26px;text-align:center}
.lb-rank.top{color:#fbbf24}
.lb-name{flex:1;font-size:14px;font-weight:500}
.lb-pts{font-size:15px;font-weight:700;color:#6ee7b7}
.lb-pts-lbl{font-size:9px;color:#666;text-transform:uppercase}
.pool-empty{text-align:center;color:#666;font-size:13px;padding:18px}
.admin-banner{background:#3d2410;border:1px solid #92560f;border-radius:8px;padding:8px 11px;margin-bottom:12px;font-size:12px;color:#fbbf24;display:flex;align-items:center;gap:6px}
.you-badge{font-size:9px;padding:1px 6px;border-radius:4px;background:#1e3a5f;color:#93c5fd;font-weight:600}
.cta-pronos{flex:1;font-size:15px;font-weight:700;padding:12px;border:none;border-radius:10px;background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff;cursor:pointer;box-shadow:0 2px 8px rgba(37,99,235,.35)}
.cta-pronos:active{opacity:.85}
.action-row{display:flex;gap:6px;align-items:stretch;max-width:520px;margin:0 auto 12px;padding:0 2px}
.lang-switch{display:flex;flex-shrink:0;border:1px solid #2a2d3a;border-radius:10px;overflow:hidden}
.lang-btn{font-size:11px;font-weight:600;padding:0 8px;border:none;background:#1c1f2a;color:#888;cursor:pointer}
.lang-btn+.lang-btn{border-left:1px solid #2a2d3a}
.lang-btn.active{background:#2563eb;color:#fff}
.icon-btn{width:44px;flex-shrink:0;font-size:17px;border:1px solid #2a2d3a;border-radius:10px;background:#1c1f2a;color:#e8eaf0;cursor:pointer;display:flex;align-items:center;justify-content:center}

.res-title{font-size:13px;font-weight:600;color:#fff;margin-bottom:8px}

.res-grp{font-size:9px;color:#666;min-width:28px;flex-shrink:0}
.res-t{flex:1;color:#ccc;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

.res-t.rw{color:#6ee7b7;font-weight:600}
.res-sc{font-weight:700;color:#e8eaf0;min-width:36px;text-align:center;flex-shrink:0}

.sc-row{display:flex;justify-content:space-between;align-items:center;padding:4px 0;font-size:13px;border-bottom:1px solid #232633}
.sc-rd{color:#ccc}
.sc-pt{font-weight:600;color:#6ee7b7}
.sc-total{margin-top:8px;font-size:13px;text-align:right;color:#fbbf24}
.lb-sum-title{font-size:11px;font-weight:600;color:#fbbf24;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:5px}
.lb-sum-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;cursor:pointer}
.lb-sum-row+.lb-sum-row{border-top:1px solid #232633}
.lb-sum-row:active{opacity:.6}
.lb-sum-go{font-size:11px;color:#3b82f6;flex-shrink:0}
.lb-sum-rank{font-weight:700;color:#888;min-width:20px;text-align:center}
.lb-sum-rank.top{color:#fbbf24}
.lb-sum-name{flex:1}
.lb-sum-pts{font-weight:700;color:#6ee7b7}
.lb-sum-link{font-size:11px;color:#3b82f6;text-align:center;margin-top:6px;cursor:pointer}
</style>
</head>

  body+=`<div style="margin-bottom:18px"><div class="sec-title">${t('gs_results')}</div>`;
  matches.forEach(m=>{
    const isT1=m.t1===code,opp=isT1?m.t2:m.t1,oppInfo=TI[opp]||{f:'',n:opp};
    const mygf=isT1?m.s1:m.s2,myga=isT1?m.s2:m.s1,mySc=isT1?m.sc1:m.sc2,oppSc=isT1?m.sc2:m.sc1;
    const res=mygf>myga?'win':mygf===myga?'draw':'loss';
    const bmap={win:'bw',draw:'bd',loss:'bl'},btxt={win:'W',draw:'D',loss:'L'};
    body+=`<div class="rc ${res}"><div class="rc-date">${t('group')} ${m.g} · ${m.date}</div><div class="rc-teams"><span>${info.f} <strong>${info.n}</strong></span><span class="rc-score">${mygf} – ${myga}</span><span>${oppInfo.f} ${oppInfo.n}</span><span class="badge ${bmap[res]}">${btxt[res]}</span></div><div class="rc-sc">${mySc.length?`<span style="color:#bbb">${info.n}:</span> ${mySc.join(', ')}`:''}${oppSc.length?(mySc.length?'<br>':'')+`<span style="color:#bbb">${oppInfo.n}:</span> ${oppSc.join(', ')}`:''}${(!mySc.length&&!oppSc.length)?`<span style="color:#555">${t('no_goals')}</span>`:''}</div></div>`;
  });
  // R32 knockout match
  const koM=KO.find(m=>m.t1&&m.t2&&(m.t1.n===info.n||m.t2.n===info.n));
  if(koM){
    const isT1=koM.t1&&koM.t1.n===info.n,opp=isT1?koM.t2:koM.t1,w2=getW(koM.id),picked=!!w2,won=picked&&w2.n===info.n;
    body+=`<div class="rc ko"><div class="rc-date">${t('r32_fixture')} · ${koM.date} · ${koM.cet} CET · ${koM.venue}</div><div class="rc-teams"><span>${info.f} <strong>${info.n}</strong></span><span class="rc-score">vs</span><span>${opp?opp.f:''} ${opp?opp.n:'TBD'}</span>${picked?`<span class="badge ${won?'bw':'bl'}">${won?'W':'L'}</span>`:`<span class="badge btbd">TBD</span>`}</div></div>`;
  }
  body+=`</div>`;
  const scorers=SC[code]||[];
  body+=`<div style="margin-bottom:18px"><div class="sec-title">${t('gs_scorers')}</div>`;
  if(scorers.length){
    body+=`<div style="background:#1c1f2a;border:1px solid #2a2d3a;border-radius:8px;padding:4px 10px">`;
    scorers.forEach(s=>{const parts=s.match(/^(.+)\((\d+)\)$/);const name=parts?parts[1].trim():s;const goals=parts?parts[2]:'1';body+=`<div class="scorer-row"><div style="display:flex;align-items:center;gap:6px"><span>${info.f}</span><span style="font-size:13px">${name}</span></div><div class="scorer-goals">⚽ ${goals}</div></div>`;});
    body+=`</div>`;
  } else {body+=`<div style="color:#555;font-size:13px;padding:4px 0">${t('no_gs_goals')}</div>`;}
  body+=`</div>`;
  document.getElementById('dp-body').innerHTML=body;
  const panel=document.getElementById('dp');panel.classList.add('open');panel.scrollTop=0;
}
function closeDetail(){document.getElementById('dp').classList.remove('open');}

// ── POOL: data sync ──
async function poolFetch(){
  try{
    const [bRes,rRes]=await Promise.all([
      fetch(SB_URL+'/rest/v1/brackets?select=*&order=created_at.asc',{headers:SB_HEAD}),
      fetch(SB_URL+'/rest/v1/results?id=eq.1&select=picks',{headers:SB_HEAD})
    ]);
    poolEntries=await bRes.json();
    const rJson=await rRes.json();
    actualResults=(rJson[0]&&rJson[0].picks)||{};
  }catch(e){poolEntries=[];actualResults={};}
}
async function poolSubmit(){
  const nameEl=document.getElementById('pool-name');
  const name=(nameEl.value||'').trim();
  const msg=document.getElementById('pool-submit-msg');
  if(!name){msg.style.color='#f87171';msg.textContent=t('msg_name');return;}
  myName=name;localStorage.setItem('wc2026_name',name);
  msg.style.color='#888';msg.textContent=t('msg_saving');
  const body=JSON.stringify({name:name,picks:picks,updated_at:new Date().toISOString()});
  try{
    let res;
    if(myEntryId){
      res=await fetch(SB_URL+'/rest/v1/brackets?id=eq.'+myEntryId,{method:'PATCH',headers:{...SB_HEAD,'Prefer':'return=representation'},body});
    }else{
      res=await fetch(SB_URL+'/rest/v1/brackets',{method:'POST',headers:{...SB_HEAD,'Prefer':'return=representation'},body});
    }
    const j=await res.json();
    if(j&&j[0]&&j[0].id){myEntryId=j[0].id;localStorage.setItem('wc2026_entry_id',myEntryId);}
    msg.style.color='#6ee7b7';msg.textContent=t('msg_saved');
    await poolFetch();renderPool();renderLbSummary();
  }catch(e){msg.style.color='#f87171';msg.textContent=t('msg_err');}
}
// score a picks object against actualResults
function scoreEntry(entryPicks){
  let pts=0;
  KO.forEach(m=>{
    const actual=resW(m.id);   // 1 or 2 (winner)
    if(!actual)return;
    if(entryPicks[m.id]===actual)pts+=(PTS[m.r]||1);
  });
  return pts;
}
function resultsCount(){return KO.filter(m=>resW(m.id)!=null).length;}

// ── POOL: admin results entry ──
async function saveResults(){
  try{
    await fetch(SB_URL+'/rest/v1/results?id=eq.1',{method:'PATCH',headers:SB_HEAD,
      body:JSON.stringify({picks:actualResults,updated_at:new Date().toISOString()})});
  }catch(e){}
}
// set a score; winner auto-derived. For draws, keep existing winner or require tiebreak pick.
async function adminSetScore(mid,which,val){
  let r=actualResults[mid];
  if(!r||typeof r==='number')r={s1:null,s2:null,w:(typeof r==='number'?r:null)};
  const n=(val===''||val==null)?null:Math.max(0,parseInt(val)||0);
  if(which===1)r.s1=n;else r.s2=n;
  // auto-derive winner when decisive
  if(r.s1!=null&&r.s2!=null){
    if(r.s1>r.s2)r.w=1;else if(r.s2>r.s1)r.w=2;
    // if equal, leave r.w as-is (tiebreak handled by adminSetTiebreak)
  }
  actualResults[mid]=r;
  await saveResults();
  refreshAfterResult();
}
async function adminSetTiebreak(mid,slot){
  let r=actualResults[mid];if(!r||typeof r==='number')r={s1:null,s2:null,w:null};
  r.w=(slot==='t1'?1:2);actualResults[mid]=r;
  await saveResults();
  refreshAfterResult();
}
function refreshAfterResult(){
  if(currentTab==='groups')renderGroups();
  else if(currentTab==='pool')renderPool();
  if(builtTabs.bracket&&!viewingEntry)renderBracket();
  renderLbSummary();
}
async function adminClearResult(mid){
  delete actualResults[mid];
  try{
    await fetch(SB_URL+'/rest/v1/results?id=eq.1',{method:'PATCH',headers:SB_HEAD,
      body:JSON.stringify({picks:actualResults,updated_at:new Date().toISOString()})});
  }catch(e){}
  refreshAfterResult();
}
async function adminDeleteEntry(id,name){
  if(!confirm(t('del_confirm')(name)))return;
  try{
    await fetch(SB_URL+'/rest/v1/brackets?id=eq.'+id,{method:'DELETE',headers:SB_HEAD});
    if(id===myEntryId){myEntryId=null;localStorage.removeItem('wc2026_entry_id');}
    await poolFetch();renderPool();
  }catch(e){alert(t('del_err'));}
}

// view another person's bracket read-only by loading into the bracket tab
function viewEntry(id){
  const e=poolEntries.find(x=>x.id===id);if(!e)return;
  viewingEntry=e;
  // go to Tableau tab
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));
  document.querySelector('.tab').classList.add('active'); // first tab = Tableau
  ['bracket','schedule','groups','pool'].forEach(t=>{document.getElementById('tab-'+t).style.display=t==='bracket'?'':'none';});
  currentTab='bracket';
  builtTabs.bracket=true;
  renderBracket();
  updateViewBanner();
  window.scrollTo({top:0,behavior:'smooth'});
}
function exitViewing(){
  viewingEntry=null;
  renderBracket();
  updateViewBanner();
}
function updateViewBanner(){
  const bn=document.getElementById('view-banner');if(!bn)return;
  if(viewingEntry){
    bn.innerHTML=`<div style="background:#1e3a5f;border:1px solid #2563eb;border-radius:8px;padding:8px 11px;margin-bottom:10px;font-size:12px;color:#93c5fd;display:flex;justify-content:space-between;align-items:center"><span>${t('viewing')(viewingEntry.name)}</span><button onclick="exitViewing()" style="font-size:11px;padding:3px 10px;border:1px solid #2563eb;border-radius:6px;background:transparent;color:#93c5fd;cursor:pointer">${t('back_mine')}</button></div>`;
  }else{
    bn.innerHTML='';
  }
}

// ── POOL: render ──
function renderPool(){
  const el=document.getElementById('pool');
  let h='';
  if(isAdmin){
    h+=`<div class="admin-banner"><span>🔑</span><span>${t('admin_banner')(resultsCount()).replace('🔑 ','')}</span></div>`;
  }
  // submit box
  h+=`<div class="pool-box"><h3>${myEntryId?t('update_entry'):t('join')}</h3>
    <input class="pool-input" id="pool-name" placeholder="${t('your_name')}" value="${myName.replace(/"/g,'&quot;')}">
    <button class="pool-btn" onclick="poolSubmit()">${myEntryId?t('update_btn'):t('submit_btn')}</button>
    <div class="pool-msg" id="pool-submit-msg"></div>
    <div style="font-size:11px;color:#666;text-align:center;margin-top:4px">${t('pool_hint')}</div>
  </div>`;
  // leaderboard
  const hasResults=resultsCount()>0;
  h+=`<div class="pool-box"><h3>${hasResults?'🏆 '+t('leaderboard'):t('pool_entries')} (${poolEntries.length})</h3>`;
  if(!poolEntries.length){
    h+=`<div class="pool-empty">${t('no_entries')}</div>`;
  }else{
    const ranked=poolEntries.map(e=>({...e,pts:scoreEntry(e.picks||{})}))
      .sort((a,b)=>hasResults?(b.pts-a.pts):0);
    ranked.forEach((e,i)=>{
      const isMe=e.id===myEntryId;
      h+=`<div class="lb-row" onclick="viewEntry('${e.id}')">
        ${hasResults?`<span class="lb-rank ${i<3?'top':''}">${i+1}</span>`:`<span class="lb-rank">•</span>`}
        <span class="lb-name">${e.name}${isMe?' <span class="you-badge">'+t('you')+'</span>':''}</span>
        ${hasResults?`<span style="text-align:right"><div class="lb-pts">${e.pts}</div><div class="lb-pts-lbl">pts</div></span>`:`<span style="font-size:11px;color:#666">${t('tap_view')}</span>`}
        ${isAdmin?`<button onclick="event.stopPropagation();adminDeleteEntry('${e.id}','${(e.name||'').replace(/'/g,"\\'")}')" style="font-size:11px;padding:4px 8px;border-radius:6px;border:1px solid #7f2020;background:transparent;color:#f87171;cursor:pointer;margin-left:4px">✕</button>`:''}
      </div>`;
    });
  }
  h+=`</div>`;
  // scoring explainer
  h+=scoringBox();
  el.innerHTML=h;
}
// reusable admin results entry panel (now lives in the Groups tab)
function adminResultsPanel(){
  if(!isAdmin)return '';
  let h=`<div class="pool-box" style="margin-bottom:14px"><h3>${t('enter_results')}</h3>`;
  KO.forEach(m=>{
    const t1=rt(m,'t1'),t2=rt(m,'t2');
    if(!t1||!t2){h+=`<div style="font-size:11px;color:#444;padding:4px 0">${t('rl')[m.r]} · ${m.date} — ${t('teams_tbd')}</div>`;return;}
    const r=actualResults[m.id];
    const s1=(r&&typeof r==='object'&&r.s1!=null)?r.s1:'';
    const s2=(r&&typeof r==='object'&&r.s2!=null)?r.s2:'';
    const w=resW(m.id);
    const isDraw=(s1!==''&&s2!==''&&s1===s2);
    h+=`<div style="padding:6px 0;border-bottom:1px solid #1e2130">
      <div style="display:flex;align-items:center;gap:6px">
        <span style="font-size:9px;color:#666;min-width:34px">${t('rl')[m.r]}</span>
        <span style="flex:1;font-size:12px;text-align:right;${w===1?'color:#6ee7b7;font-weight:600':'color:#ccc'}">${t1.f} ${t1.n}</span>
        <input type="text" inputmode="numeric" value="${s1}" onchange="adminSetScore('${m.id}',1,this.value)" style="width:34px;text-align:center;font-size:13px;padding:4px;border:1px solid #2a2d3a;border-radius:6px;background:#0f1117;color:#e8eaf0">
        <span style="color:#555">–</span>
        <input type="text" inputmode="numeric" value="${s2}" onchange="adminSetScore('${m.id}',2,this.value)" style="width:34px;text-align:center;font-size:13px;padding:4px;border:1px solid #2a2d3a;border-radius:6px;background:#0f1117;color:#e8eaf0">
        <span style="flex:1;font-size:12px;${w===2?'color:#6ee7b7;font-weight:600':'color:#ccc'}">${t2.f} ${t2.n}</span>
        ${r?`<button onclick="adminClearResult('${m.id}')" style="font-size:10px;padding:4px 7px;border-radius:6px;border:1px solid #7f2020;background:transparent;color:#f87171;cursor:pointer">✕</button>`:''}
      </div>
      ${isDraw?`<div style="display:flex;align-items:center;gap:6px;margin-top:4px;padding-left:40px">
        <span style="font-size:10px;color:#fbbf24">⚖ ${t('tiebreak')}</span>
        <button onclick="adminSetTiebreak('${m.id}','t1')" style="font-size:10px;padding:3px 8px;border-radius:6px;cursor:pointer;border:1px solid ${w===1?'#22c55e':'#2a2d3a'};background:${w===1?'#14432a':'#1c1f2a'};color:${w===1?'#6ee7b7':'#ccc'}">${t1.n}</button>
        <button onclick="adminSetTiebreak('${m.id}','t2')" style="font-size:10px;padding:3px 8px;border-radius:6px;cursor:pointer;border:1px solid ${w===2?'#22c55e':'#2a2d3a'};background:${w===2?'#14432a':'#1c1f2a'};color:${w===2?'#6ee7b7':'#ccc'}">${t2.n}</button>
      </div>`:''}
    </div>`;
  });
  h+=`</div>`;
  return h;
}
async function buildPool(){
  document.getElementById('pool').innerHTML=`<div class="pool-empty">${t('loading')}</div>`;
  await poolFetch();
  renderPool();
  renderLbSummary();
}
// scoring explainer box (round-weighted points + total available)
function scoringBox(){
  const rows=[['1/32',1,16],['1/8',2,8],['1/4',4,4],['1/2',6,2],['3e/3rd',3,1],[t('final'),10,1]];
  let total=0;rows.forEach(r=>total+=r[1]*r[2]);
  let inner=rows.map(r=>`<div class="sc-row"><span class="sc-rd">${r[0]}</span><span class="sc-pt">${r[1]} pt${r[1]>1?'s':''}</span></div>`).join('');
  return `<div class="pool-box scoring-box"><h3>📊 ${t('scoring')}</h3><div class="sc-sub">${t('per_correct')}</div>${inner}<div class="sc-total">${t('total_avail')} : <b>${total} pts</b></div></div>`;
}
// compact leaderboard shown atop the Tableau
function renderLbSummary(){
  const el=document.getElementById('lb-summary');if(!el)return;
  if(!poolEntries.length||resultsCount()===0){el.innerHTML='';return;}
  const ranked=poolEntries.map(e=>({...e,pts:scoreEntry(e.picks||{})})).sort((a,b)=>b.pts-a.pts);
  let rows='';
  const top=ranked.slice(0,5);
  top.forEach((e,i)=>{
    const isMe=e.id===myEntryId;
    rows+=`<div class="lb-sum-row" onclick="viewEntry('${e.id}')"><span class="lb-sum-rank ${i<3?'top':''}">${i+1}</span><span class="lb-sum-name">${e.name}${isMe?' <span class="you-badge">'+t('you')+'</span>':''}</span><span class="lb-sum-pts">${e.pts} pts</span><span class="lb-sum-go">${t('view')}</span></div>`;
  });
  // if I have an entry but I'm outside the top 5, append my own row
  if(myEntryId){
    const myRank=ranked.findIndex(e=>e.id===myEntryId);
    if(myRank>=5){
      const e=ranked[myRank];
      rows+=`<div class="lb-sum-row" style="border-top:2px solid #2a2d3a" onclick="viewEntry('${e.id}')"><span class="lb-sum-rank">${myRank+1}</span><span class="lb-sum-name">${e.name} <span class="you-badge">${t('you')}</span></span><span class="lb-sum-pts">${e.pts} pts</span><span class="lb-sum-go">${t('view')}</span></div>`;
    }
  }
  const more=ranked.length>5?`<div class="lb-sum-link" onclick="goPronos()">${t('full_ranking')(ranked.length)}</div>`:'';
  el.innerHTML=`<div class="lb-summary"><div class="lb-sum-box"><div class="lb-sum-title">🏆 ${t('leaderboard')}</div>${rows}${more}</div></div>`;
}

let builtTabs={bracket:false,schedule:false,groups:false,pool:false};
let currentTab='bracket';
function buildTab(name){
  if(name==='bracket')renderBracket();
  else if(name==='schedule')renderSchedule();
  else if(name==='groups')renderGroups();
  else if(name==='pool')buildPool();
  builtTabs[name]=true;
}
function switchTab(name,el){
  currentTab=name;
  if(viewingEntry){viewingEntry=null;updateViewBanner();if(name==='bracket')renderBracket();}
  ['bracket','schedule','groups','pool'].forEach(t=>{document.getElementById('tab-'+t).style.display=t===name?'':'none';});
  document.querySelectorAll('.tab').forEach(b=>b.classList.remove('active'));el.classList.add('active');
  if(!builtTabs[name])buildTab(name);
  else if(name==='pool')buildPool();
}
function goPronos(){
  const tabs=document.querySelectorAll('.tab');
  const pronosBtn=tabs[1]; // Tableau, Pronos, Calendrier, Groupes
  switchTab('pool',pronosBtn);
  window.scrollTo({top:0,behavior:'smooth'});
}
function render(){
  // only (re)build tabs that have already been viewed; visible tab always built
  if(!builtTabs[currentTab])buildTab(currentTab);
  if(builtTabs.bracket&&!viewingEntry)renderBracket();
  if(builtTabs.schedule)renderSchedule();
  if(builtTabs.groups)renderGroups();
  document.getElementById('btn-undo').disabled=history.length===0;
  const lb=document.getElementById('btn-lock');lb.className='icon-btn'+(isLocked?' lock-on':'');lb.textContent=isLocked?'🔒':'🔓';lb.title=isLocked?t('lockon'):t('lock');
  const sb=document.getElementById('status-bar');
  if(isLocked){const n=Object.keys(locked).length;sb.textContent=t('locked_n')(n);}else sb.innerHTML='';
  const dp=document.getElementById('dp');
  if(dp.classList.contains('open')){const fl=document.getElementById('dp-title').children[0]?document.getElementById('dp-title').children[0].textContent:'';const code=Object.keys(TI).find(k=>TI[k].f===fl);if(code)openDetail(code);}
}
applyStaticText();
document.querySelectorAll('.lang-btn').forEach(b=>b.classList.toggle('active',b.dataset.l===lang));
load();
render();
// pull actual results on startup so the Tableau shows real winners even before opening Pronos
poolFetch().then(()=>{if(builtTabs.bracket&&!viewingEntry)renderBracket();if(currentTab==='groups'&&builtTabs.groups)renderGroups();renderLbSummary();});
</script>
